name: data-cleaning-env
version: "1.0.0"
description: >
  An OpenEnv-compatible reinforcement learning environment for data cleaning tasks.
  The agent receives dirty CSV datasets and must emit structured action strings
  to fill missing values, standardize formats, and remove duplicates/outliers.

author: hackathon-submission
tags:
  - openenv
  - data-cleaning
  - tabular
  - real-world

tasks:
  - name: easy
    description: Fill missing values using mean and forward-fill strategies.
    difficulty: easy
    max_steps: 5
    grader: env.graders:grade_easy
    reward_range: [0.001, 0.99]

  - name: medium
    description: Standardize inconsistent name casing, phone formats, and date formats.
    difficulty: medium
    max_steps: 5
    grader: env.graders:grade_medium
    reward_range: [0.001, 0.99]

  - name: hard
    description: Detect and remove duplicate rows, then replace numeric outliers with column means.
    difficulty: hard
    max_steps: 5
    grader: env.graders:grade_hard
    reward_range: [0.001, 0.99]
observation_space:
  type: object
  fields:
    task_name:      string
    description:    string
    current_data:   string   # CSV representation of the current (possibly partial) dataframe
    step_number:    integer
    previous_score: float    # 0.0–1.0

action_space:
  type: string
  description: >
    A structured text command in the format "action_type:key=value,..."
  examples:
    - "fill_nulls:mean_age=29.5,mean_salary=58750.0,ffill_city=Delhi"
    - "standardize:name=title_case,phone=digits_only,date=iso"
    - "clean_hard:remove_duplicates=true,replace_outliers=mean"

reward:
  type: float
  range: [0.001, 0.999]
  description: >
    Incremental improvement in score since the last step.
    A perfect cleaning in one step yields reward=0.999.
    An action that makes things worse or raises an error yields reward=0.001.

entry_point: env.environment:DataCleaningEnv
